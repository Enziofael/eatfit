syntax = "proto3";

package eatfit.v1;

option java_package = "enzio.android.eatfit.proto";
option java_multiple_files = true;
option java_outer_classname = "DiaryProto";

import "google/protobuf/timestamp.proto";

service DiaryService {
  rpc AddConsumption(AddConsumptionRequest) returns (AddConsumptionResponse);
  rpc ListConsumptions(ListConsumptionsRequest) returns (ListConsumptionsResponse);
  rpc DeleteConsumption(DeleteConsumptionRequest) returns (DeleteConsumptionResponse);
}

message AddConsumptionRequest {
  string user_id = 1;
  string meal_id = 2;
  string meal_name = 3;
  double amount = 4;
  double calories = 5;
  double proteins = 6;
  double fats = 7;
  double carbs = 8;
  double water = 9;
}

message AddConsumptionResponse {
  bool success = 1;
  ConsumptionRecord record = 2;
}

message ListConsumptionsRequest {
  string user_id = 1;
  int32 limit = 2;
}

message ListConsumptionsResponse {
  repeated ConsumptionGroup groups = 1;
}

message ConsumptionGroup {
  string date = 1;
  repeated ConsumptionRecord records = 2;
}

message DeleteConsumptionRequest {
  string record_id = 1;
}

message DeleteConsumptionResponse {
  bool success = 1;
}

message ConsumptionRecord {
  string record_id = 1;
  string meal_id = 2;
  string meal_name = 3;
  double amount = 4;
  double calories = 5;
  double proteins = 6;
  double fats = 7;
  double carbs = 8;
  double water = 9;
  google.protobuf.Timestamp consumed_at = 10;
}