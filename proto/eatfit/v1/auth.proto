// proto/eatfit/v1/auth.proto
syntax = "proto3";

package eatfit.v1;

option go_package = "github.com/Enziofael/eatfit/backend/api/gen/eatfit/v1;eatfitv1";

import "google/protobuf/timestamp.proto";

// --------------------------------------------------------------------------
// AuthService - сервис аутентификации и регистрации пользователей
// 
// Обеспечивает полный цикл управления учётными записями:
// - Регистрация с подтверждением email
// - Аутентификация по логину/email и паролю
// - Управление сессиями через JWT токены
// - Восстановление доступа
// --------------------------------------------------------------------------
service AuthService {
    // Register - регистрация нового пользователя
    // 
    // Создаёт неподтверждённую учётную запись и отправляет код верификации на email.
    // Пароль должен соответствовать требованиям безопасности.
    // Логин и email должны быть уникальными в системе.
    rpc Register(RegisterRequest) returns (RegisterResponse);
    
    // VerifyEmail - подтверждение email адреса
    // 
    // Активирует учётную запись после ввода кода, отправленного на почту.
    // После подтверждения пользователь может войти в систему.
    rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
    
    // Login - аутентификация пользователя
    // 
    // Выполняет вход по логину или email и паролю.
    // Возвращает пару токенов: access_token (короткоживущий) и refresh_token (долгоживущий).
    rpc Login(LoginRequest) returns (LoginResponse);
    
    // RefreshToken - обновление access токена
    // 
    // Позволяет получить новый access_token по действующему refresh_token.
    rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
    
    // Logout - выход из системы
    // 
    // Отзывает refresh_token, делая его недействительным.
    rpc Logout(LogoutRequest) returns (LogoutResponse);
    
    // ResendVerification - повторная отправка кода верификации
    // 
    // Отправляет новый код на email, если предыдущий истёк или не был получен.
    rpc ResendVerification(ResendVerificationRequest) returns (ResendVerificationResponse);
}

// --------------------------------------------------------------------------
// Запрос на регистрацию нового пользователя
// --------------------------------------------------------------------------
message RegisterRequest {
    // Email пользователя (должен быть уникальным в системе)
    // Формат: стандартный email адрес
    // Пример: user@example.com
    string email = 1;
    
    // Логин пользователя (должен быть уникальным в системе)
    // Ограничения: 3-30 символов, только латиница, цифры и подчёркивание
    // Пример: john_doe
    string login = 2;
    
    // Пароль пользователя
    // Требования: минимум 5 символов, минимум 1 заглавная буква, 
    // 1 строчная буква, 1 цифра, 1 спецсимвол
    string password = 3;
    
    // Подтверждение пароля (должно совпадать с password)
    string password_confirmation = 4;
}

// --------------------------------------------------------------------------
// Ответ на регистрацию
// --------------------------------------------------------------------------
message RegisterResponse {
    // Уникальный идентификатор созданного пользователя
    // Формат: UUID v4
    string user_id = 1;
    
    // Сообщение о результате операции
    string message = 2;
    
    // Флаг успешности операции
    bool success = 3;
}

// --------------------------------------------------------------------------
// Запрос на подтверждение email
// --------------------------------------------------------------------------
message VerifyEmailRequest {
    // Идентификатор пользователя (получен при регистрации)
    string user_id = 1;
    
    // Код подтверждения, отправленный на email
    // Формат: 6 цифр
    // Пример: 123456
    string verification_code = 2;
}

// --------------------------------------------------------------------------
// Ответ на подтверждение email
// --------------------------------------------------------------------------
message VerifyEmailResponse {
    // Флаг успешности подтверждения
    bool success = 1;
    
    // Сообщение о результате операции
    string message = 2;
}

// --------------------------------------------------------------------------
// Запрос на вход в систему
// --------------------------------------------------------------------------
message LoginRequest {
    // Идентификатор для входа: email ИЛИ login
    oneof login_method {
        // Email пользователя
        string email = 1;
        
        // Логин пользователя
        string login = 2;
    }
    
    // Пароль пользователя
    string password = 3;
    
    // Информация об устройстве для аудита (опционально)
    // Пример: "iPhone 13, iOS 17.2"
    string device_info = 4;
}

// --------------------------------------------------------------------------
// Ответ на вход в систему
// --------------------------------------------------------------------------
message LoginResponse {
    // Access токен для доступа к API
    // Тип: JWT Bearer token
    // Время жизни: 15 минут
    string access_token = 1;
    
    // Refresh токен для обновления access токена
    // Время жизни: 30 дней
    string refresh_token = 2;
    
    // Время жизни access токена в секундах
    int64 expires_in = 3;
    
    // Тип токена (Bearer)
    string token_type = 4;
    
    // Информация о пользователе
    UserProfile user = 5;
}

// --------------------------------------------------------------------------
// Профиль пользователя (базовая информация)
// --------------------------------------------------------------------------
message UserProfile {
    // Уникальный идентификатор пользователя
    string user_id = 1;
    
    // Email пользователя
    string email = 2;
    
    // Логин пользователя
    string login = 3;
    
    // Статус подтверждения email
    bool email_verified = 4;
    
    // Дата и время создания учётной записи
    google.protobuf.Timestamp created_at = 5;
}

// --------------------------------------------------------------------------
// Запрос на обновление токенов
// --------------------------------------------------------------------------
message RefreshTokenRequest {
    // Действующий refresh токен
    string refresh_token = 1;
}

// --------------------------------------------------------------------------
// Ответ на обновление токенов
// --------------------------------------------------------------------------
message RefreshTokenResponse {
    // Новый access токен
    string access_token = 1;
    
    // Новый refresh токен (старый становится недействительным)
    string refresh_token = 2;
    
    // Время жизни access токена в секундах
    int64 expires_in = 3;
}

// --------------------------------------------------------------------------
// Запрос на выход из системы
// --------------------------------------------------------------------------
message LogoutRequest {
    // Refresh токен, который нужно отозвать
    string refresh_token = 1;
}

// --------------------------------------------------------------------------
// Ответ на выход из системы
// --------------------------------------------------------------------------
message LogoutResponse {
    // Флаг успешности выхода
    bool success = 1;
}

// --------------------------------------------------------------------------
// Запрос на повторную отправку кода верификации
// --------------------------------------------------------------------------
message ResendVerificationRequest {
    // Идентификатор пользователя
    string user_id = 1;
}

// --------------------------------------------------------------------------
// Ответ на повторную отправку кода верификации
// --------------------------------------------------------------------------
message ResendVerificationResponse {
    // Флаг успешности отправки
    bool success = 1;
    
    // Сообщение о результате операции
    string message = 2;
}